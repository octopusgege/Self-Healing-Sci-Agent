<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QKD 仿真 Agent 助手</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/vue@3.2.31/dist/vue.global.min.js"></script>
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            margin: 0;
            padding: 0;
        }

        #loading-error {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            z-index: 9999;
        }

        #loading-error.show {
            display: block;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        ::-webkit-scrollbar-thumb {
            background: #c1c1c1;
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #a8a8a8;
        }

        textarea {
            min-height: 44px;
            max-height: 200px;
            transition: height 0.2s;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 0.5;
            }
            50% {
                opacity: 1;
            }
        }

        .animate-pulse {
            animation: pulse 1.5s infinite;
        }

        .delay-100 {
            animation-delay: 0.1s;
        }

        .delay-200 {
            animation-delay: 0.2s;
        }

        .typing-cursor::after {
            content: "|";
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {
            from, to {
                opacity: 1;
            }
            50% {
                opacity: 0;
            }
        }

        .upload-panel {
            transition: all 0.3s ease;
        }

        .upload-panel.collapsed {
            max-height: 0;
            overflow: hidden;
            padding: 0;
            border: none;
        }

        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
        }

        .file-input-wrapper input[type=file] {
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            cursor: pointer;
            width: 100%;
            height: 100%;
        }

        .file-label {
            display: flex;
            align-items: center;
            padding: 8px 16px;
            border: 2px dashed #d1d5db;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .file-label:hover {
            border-color: #3b82f6;
            background-color: #eff6ff;
        }

        .file-label.has-file {
            border-color: #10b981;
            background-color: #ecfdf5;
        }

        .upload-progress {
            height: 4px;
            background-color: #e5e7eb;
            border-radius: 2px;
            overflow: hidden;
        }

        .upload-progress-bar {
            height: 100%;
            background-color: #3b82f6;
            transition: width 0.3s ease;
        }
    </style>
</head>
<body>
<div id="loading-error">
    <h2 style="color: red; margin-top: 0;">⚠️ 资源加载失败</h2>
    <p>无法连接到 CDN 服务器，请检查网络连接后刷新页面重试。</p>
    <button onclick="location.reload()" style="margin-top: 15px; padding: 10px 20px; background: #3b82f6; color: white; border: none; border-radius: 5px; cursor: pointer;">刷新页面</button>
</div>

<div id="app" class="flex flex-col h-screen bg-gray-50">
    <header class="bg-white shadow-sm py-3 px-4 flex items-center justify-between">
        <div class="flex items-center">
            <div class="text-xl font-bold text-blue-600">QKD 仿真 Agent 助手</div>
            <a href="/test.html" target="_blank" style="margin-left: 10px; padding: 5px 10px; background: #6b7280; color: white; border-radius: 5px; text-decoration: none; font-size: 12px;" title="系统检测工具">🔍 检测工具</a>
        </div>
        <div class="flex items-center space-x-3">
            <button
                    @click="toggleUploadPanel"
                    :class="['p-3 rounded-lg text-white', showUploadPanel ? 'bg-purple-600 hover:bg-purple-700' : 'bg-purple-500 hover:bg-purple-600']"
                    style="width: 50px"
                    title="上传 PDF 文献">
                <i class="fas fa-upload"></i>
            </button>
            <button
                    @click="startNewConversation"
                    class="ml-2 p-3 rounded-lg bg-green-500 hover:bg-green-600 text-white" style="width: 50px">
                <i class="fas fa-plus"></i>
            </button>
            <button @click="toggleDarkMode" class="p-2 rounded-full hover:bg-gray-100">
                <i :class="darkMode ? 'fas fa-moon text-gray-600' : 'fas fa-sun text-gray-600'"></i>
            </button>
        </div>
    </header>

    <div :class="['upload-panel bg-gray-100 border-b border-gray-200 px-4', showUploadPanel ? 'py-4' : 'collapsed']"
         :style="darkMode ? 'background-color: #1f2937; border-color: #374151;' : ''">
        <div class="max-w-3xl mx-auto">
            <div :class="['text-sm font-medium mb-3', darkMode ? 'text-gray-200' : 'text-gray-700']">
                <i class="fas fa-file-upload mr-2"></i>上传 QKD 协议文献并指定仿真图号
            </div>
            <div class="mb-3">
                <div class="file-input-wrapper w-full">
                    <div :class="['file-label w-full', pdfFile ? 'has-file' : '', darkMode ? 'border-gray-600 hover:border-blue-400' : '']"
                         :style="pdfFile ? (darkMode ? 'border-color: #10b981; background-color: #064e3b;' : '') : ''">
                        <i :class="['mr-2', pdfFile ? 'fas fa-file-pdf text-red-500' : 'fas fa-file-pdf text-gray-400']"></i>
                        <span :class="['text-sm truncate flex-1', darkMode ? 'text-gray-300' : 'text-gray-600']">
                            {{ isUploading ? '正在上传...' : (pdfFile ? pdfFile.name : '点击选择 PDF 文献文件...') }}
                        </span>
                        <i v-if="isUploading" class="fas fa-spinner fa-spin text-blue-500 ml-2"></i>
                        <i v-else-if="pdfFile" class="fas fa-check-circle text-green-500 ml-2"></i>
                    </div>
                    <input type="file" accept=".pdf" @change="handlePdfSelect" :disabled="isUploading" />
                </div>
            </div>
            <div class="mb-3" v-show="pdfFile && !isUploading">
                <label :class="['text-xs mb-1 block', darkMode ? 'text-gray-400' : 'text-gray-700']">
                    <i class="fas fa-chart-line mr-1"></i>要仿真的是文章中的哪个图？（如：Fig.2、图 3、Figure 1 等）
                </label>
                <div class="flex space-x-2">
                    <input type="text" v-model="figureNumber"
                           placeholder="请输入图号，例如：Fig.2 或 图 3"
                           @keydown.enter.exact.prevent="submitToAgent"
                           :class="['flex-1 border rounded-lg py-2 px-3 focus:outline-none focus:ring-2',
                                    darkMode ? 'bg-gray-700 border-gray-600 text-white focus:ring-blue-400' : 'focus:ring-blue-500']" />
                    <button @click="submitToAgent"
                            :disabled="!figureNumber || !figureNumber.trim()"
                            :class="['px-4 py-2 rounded-lg text-white font-medium transition-all',
                                     figureNumber && figureNumber.trim() ? 'bg-blue-500 hover:bg-blue-600' : 'bg-gray-400 cursor-not-allowed']">
                        <i class="fas fa-paper-plane mr-1"></i>提交
                    </button>
                </div>
            </div>
            <div v-if="uploadProgress > 0 && uploadProgress < 100" class="upload-progress mb-3">
                <div class="upload-progress-bar" :style="{ width: uploadProgress + '%' }"></div>
            </div>
            <div v-if="uploadStatus" :class="['text-sm', uploadStatus.success ? 'text-green-600' : 'text-red-600']">
                <i :class="['mr-1', uploadStatus.success ? 'fas fa-check-circle' : 'fas fa-exclamation-circle']"></i>
                {{ uploadStatus.message }}
            </div>
            <div v-if="isUploading" class="text-sm text-blue-600 mt-2">
                <i class="fas fa-info-circle mr-1"></i>
                正在上传文献，请稍候...
            </div>
            <div v-if="pdfFile && !isUploading && uploadStatus?.success" class="text-sm text-green-600 mt-2">
                <i class="fas fa-check-circle mr-1"></i>
                文献已上传成功！请输入要仿真的图号并点击提交按钮。
            </div>
        </div>
    </div>

    <main class="flex-1 overflow-y-auto p-4 space-y-6" ref="chatContainer" :class="{ 'bg-gray-800': darkMode }">
        <div v-for="(message, index) in messages" :key="index" class="max-w-3xl mx-auto">
            <div :class="['flex', message.role === 'user' ? 'justify-end' : 'justify-start']">
                <div :class="['flex items-start space-x-3', message.role === 'user' ? 'flex-row-reverse space-x-reverse' : '']">
                    <div :class="['w-8 h-8 rounded-full flex items-center justify-center',
                                    message.role === 'user' ? 'bg-blue-100 text-blue-600' : 'bg-green-100 text-green-600',
                                    darkMode && message.role === 'assistant' ? 'bg-gray-700 text-green-400' : '']">
                        <i :class="message.role === 'user' ? 'fas fa-user' : 'fas fa-robot'"></i>
                    </div>
                    <div :class="['p-3 rounded-lg max-w-lg',
                                    message.role === 'user'
                                        ? 'bg-blue-500 text-white'
                                        : darkMode
                                            ? 'bg-gray-700 text-gray-100 border-gray-600'
                                            : 'bg-white shadow border border-gray-100']">
                        <div v-if="message.role === 'assistant' && message.isLoading" class="flex space-x-2">
                            <div :class="['w-2 h-2 rounded-full', darkMode ? 'bg-gray-400' : 'bg-gray-300', 'animate-pulse']"></div>
                            <div :class="['w-2 h-2 rounded-full', darkMode ? 'bg-gray-400' : 'bg-gray-300', 'animate-pulse delay-100']"></div>
                            <div :class="['w-2 h-2 rounded-full', darkMode ? 'bg-gray-400' : 'bg-gray-300', 'animate-pulse delay-200']"></div>
                        </div>
                        <div v-else class="whitespace-pre-wrap">
                                <span v-for="(char, charIndex) in message.content" :key="charIndex"
                                      :class="{'opacity-0': charIndex >= message.visibleChars, 'fade-in': charIndex < message.visibleChars}">
                                    {{ char }}
                                </span>
                            <span v-if="message.isStreaming" class="typing-cursor"></span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer :class="['border-t p-4', darkMode ? 'bg-gray-800 border-gray-700' : 'bg-white border-gray-200']">
        <div class="max-w-3xl mx-auto relative">
            <div class="flex items-center">
                    <textarea
                            v-model="userInput"
                            @keydown.enter.exact.prevent="sendMessage"
                            @keydown.ctrl.enter.exact.prevent="sendMessage"
                            @keydown.esc.exact="stopResponse"
                            placeholder="输入您的问题..."
                            :class="['flex-1 border rounded-lg py-3 px-4 pr-12 focus:outline-none focus:ring-2 resize-none',
                                darkMode
                                    ? 'bg-gray-700 border-gray-600 text-white focus:ring-blue-400 placeholder-gray-400'
                                    : 'border-gray-300 focus:ring-blue-500 focus:border-transparent']"
                            rows="1"
                            ref="textarea"
                            @input="adjustTextareaHeight"
                    ></textarea>

                <button
                        @click="isLoading ? stopResponse() : sendMessage()"
                        :disabled="!userInput.trim() && !isLoading"
                        :class="['ml-2 p-3 rounded-lg',
                                isLoading
                                    ? 'bg-red-500 hover:bg-red-600 text-white'
                                    : 'bg-blue-500 hover:bg-blue-600 text-white',
                                'disabled:opacity-50 disabled:cursor-not-allowed']"
                >
                    <i :class="isLoading ? 'fas fa-stop' : 'fas fa-paper-plane'"></i>
                </button>
            </div>
        </div>
    </footer>
</div>

<script>
    const {createApp, ref, nextTick, onMounted, watch} = Vue;

    createApp({
        setup() {
            const messages = ref([]);
            const userInput = ref('');
            const isLoading = ref(false);
            const chatContainer = ref(null);
            const textarea = ref(null);
            const darkMode = ref(false);

            // =============================================
            // 会话持久化逻辑：基于 localStorage 维持 memoryId
            // =============================================
            let savedId = localStorage.getItem('qkd_chat_memory_id');
            if (!savedId) {
                savedId = 'session_' + Date.now().toString();
                localStorage.setItem('qkd_chat_memory_id', savedId);
            }
            const memoeryId = ref(savedId);

            let controller = null;
            let typingInterval = null;

            const showUploadPanel = ref(false);
            const pdfFile = ref(null);
            const figureNumber = ref('');
            const isUploading = ref(false);
            const uploadProgress = ref(0);
            const uploadStatus = ref(null);

            // 自适应文本框高度
            const adjustTextareaHeight = () => {
                const textareaEl = textarea.value;
                textareaEl.style.height = 'auto';
                textareaEl.style.height = `${Math.min(textareaEl.scrollHeight, 200)}px`;
            };

            // 保持滚动条在最底部
            const scrollToBottom = () => {
                nextTick(() => {
                    if (chatContainer.value) {
                        chatContainer.value.scrollTop = chatContainer.value.scrollHeight;
                    }
                });
            };

            const toggleDarkMode = () => {
                darkMode.value = !darkMode.value;
                localStorage.setItem('darkMode', darkMode.value);
            };

            const toggleUploadPanel = () => {
                showUploadPanel.value = !showUploadPanel.value;
            };

            // 处理文献上传请求 (原生 XHR 实现上传进度条)
            const handlePdfSelect = async (event) => {
                const file = event.target.files[0];
                if (!file || file.type !== 'application/pdf') {
                    uploadStatus.value = { success: false, message: '文件格式错误，请上传 PDF' };
                    return;
                }
                if (isUploading.value) return;

                pdfFile.value = file;
                isUploading.value = true;
                uploadProgress.value = 0;
                uploadStatus.value = null;
                figureNumber.value = '';

                const formData = new FormData();
                formData.append('pdfFile', file);

                try {
                    const xhr = new XMLHttpRequest();
                    // 监听原生上传进度事件
                    xhr.upload.addEventListener('progress', (evt) => {
                        if (evt.lengthComputable) {
                            uploadProgress.value = Math.round((evt.loaded / evt.total) * 100);
                        }
                    });

                    await new Promise((resolve, reject) => {
                        xhr.onload = () => {
                            if (xhr.status >= 200 && xhr.status < 300) resolve(xhr.responseText);
                            else reject(new Error(`HTTP异常状态码: ${xhr.status}`));
                        };
                        xhr.onerror = () => reject(new Error('网络连接中断'));
                        xhr.open('POST', '/api/v1/qkd/upload');
                        xhr.send(formData);
                    });

                    uploadProgress.value = 100;
                    uploadStatus.value = { success: true, message: '文献解析注入成功' };
                } catch (error) {
                    uploadStatus.value = { success: false, message: error.message };
                    uploadProgress.value = 0;
                    pdfFile.value = null;
                    event.target.value = '';
                } finally {
                    isUploading.value = false;
                }
            };

            // 提交分析指令至大模型
            const submitToAgent = async () => {
                if (!pdfFile.value || !figureNumber.value || !figureNumber.value.trim()) return;
                const fileName = pdfFile.value.name;

                // 拼接硬编码指令，触发后端 Agent 核心工作流
                let autoMessage = `我已经上传了 QKD 文献：${fileName}。`;
                autoMessage += `请仿真图中 ${figureNumber.value.trim()} 的结果。`;
                autoMessage += `请结合 RAG 知识库提取旧版参考代码，生成模块化脚本，执行代码并在遇到报错时自主排查重试。`;

                userInput.value = autoMessage;
                await sendMessage();

                // 状态位重置
                showUploadPanel.value = false;
                pdfFile.value = null;
                figureNumber.value = '';
                uploadProgress.value = 0;
                uploadStatus.value = null;
                const fileInput = document.querySelector('input[type="file"]');
                if (fileInput) fileInput.value = '';
            };

            // 清除旧会话并生成全新上下文 ID
            const startNewConversation = () => {
                messages.value = [];
                memoeryId.value = 'session_' + Date.now().toString();
                localStorage.setItem('qkd_chat_memory_id', memoeryId.value);
                messages.value.push({
                    role: 'assistant',
                    content: '系统已初始化，过往会话上下文已清空。您可以上传新文献或直接提问。',
                    isLoading: false,
                    visibleChars: 0,
                    isStreaming: false
                });
                messages.value[0].visibleChars = messages.value[0].content.length;
                scrollToBottom();
                nextTick(() => textarea.value.focus());
            };

            // 打字机动画效果计算逻辑
            const startTypingEffect = (messageIndex) => {
                const message = messages.value[messageIndex];
                if (!message || message.visibleChars >= message.content.length) {
                    clearInterval(typingInterval);
                    typingInterval = null;
                    messages.value[messageIndex].isStreaming = false;
                    return;
                }
                messages.value[messageIndex].visibleChars++;
                scrollToBottom();
            };

            // =============================================
            // 核心：基于 Fetch API 的 SSE (Server-Sent Events) 流式解析
            // =============================================
            const sendMessage = async () => {
                if (!userInput.value.trim() || isLoading.value) return;

                if (controller) controller.abort();
                controller = new AbortController();

                messages.value.push({
                    role: 'user',
                    content: userInput.value.trim(),
                    isLoading: false,
                    visibleChars: userInput.value.trim().length,
                    isStreaming: false
                });

                const messageIndex = messages.value.length;
                messages.value.push({
                    role: 'assistant',
                    content: '',
                    isLoading: true,
                    visibleChars: 0,
                    isStreaming: true
                });

                const currentInput = userInput.value.trim();
                userInput.value = '';
                adjustTextareaHeight();
                scrollToBottom();
                isLoading.value = true;

                try {
                    const response = await fetch(`/chat?message=${encodeURIComponent(currentInput)}&memoryId=${memoeryId.value}`, {
                        signal: controller.signal
                    });

                    if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);

                    const reader = response.body.getReader();
                    const decoder = new TextDecoder('utf-8');
                    let buffer = '';

                    if (typingInterval) {
                        clearInterval(typingInterval);
                        typingInterval = null;
                    }

                    // 循环读取 HTTP 流
                    while (true) {
                        const {done, value} = await reader.read();
                        if (done) break;

                        const chunk = decoder.decode(value, {stream: true});
                        const lines = chunk.split('\n');

                        // 清洗 Spring WebFlux 默认的 data: 协议头
                        for (let line of lines) {
                            if (line.startsWith('data:')) {
                                let text = line.substring(5);
                                if (text.startsWith(' ')) text = text.substring(1);
                                buffer += text;
                            }
                        }

                        messages.value[messageIndex].content = buffer;
                        messages.value[messageIndex].isLoading = false;

                        // 异步启动打字机渲染
                        if (!typingInterval) {
                            typingInterval = setInterval(() => startTypingEffect(messageIndex), 20);
                        }
                    }
                } catch (error) {
                    if (error.name !== 'AbortError') {
                        messages.value[messageIndex].content = '请求异常: ' + error.message;
                        messages.value[messageIndex].visibleChars = messages.value[messageIndex].content.length;
                    }
                } finally {
                    // 收尾工作：清理状态机及计时器
                    messages.value[messageIndex].isLoading = false;
                    messages.value[messageIndex].isStreaming = false;
                    messages.value[messageIndex].visibleChars = messages.value[messageIndex].content.length;
                    isLoading.value = false;
                    controller = null;
                    if (typingInterval) {
                        clearInterval(typingInterval);
                        typingInterval = null;
                    }
                    scrollToBottom();
                }
            };

            const stopResponse = () => {
                if (controller) {
                    controller.abort();
                    isLoading.value = false;
                    controller = null;
                }
            };

            onMounted(() => {
                darkMode.value = localStorage.getItem('darkMode') === 'true';
                messages.value.push({
                    role: 'assistant',
                    content: '系统已就绪。检测到历史会话已恢复，您可以继续之前的上下文进行提问。',
                    isLoading: false,
                    visibleChars: 0,
                    isStreaming: false
                });
                messages.value[0].visibleChars = messages.value[0].content.length;
                scrollToBottom();
                nextTick(() => textarea.value.focus());
            });

            watch(messages, scrollToBottom, {deep: true});

            return {
                messages, userInput, isLoading, darkMode, chatContainer, textarea,
                sendMessage, stopResponse, toggleDarkMode, adjustTextareaHeight, startNewConversation,
                showUploadPanel, pdfFile, figureNumber, isUploading, uploadProgress, uploadStatus,
                toggleUploadPanel, handlePdfSelect, submitToAgent
            };
        }
    }).mount('#app');
</script>
</body>
</html>
